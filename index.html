<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もつ焼きメニュールーレット Ver.18.0</title>
    <style>
        :root { --primary-red: #d32f2f; --bg-color: #f4ece2; --paper-color: #fffaf0; --gold: #d4af37; --dark-brown: #5d4037; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: var(--bg-color); color: #333; text-align: center; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 550px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 3px double #8b4513; }
        h1 { color: var(--primary-red); font-size: 1.4rem; border-bottom: 2px solid var(--primary-red); padding-bottom: 10px; margin-bottom: 15px; }
        .controls { margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 8px; text-align: left; font-size: 0.9rem; }
        .control-group { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .preference-panel { background: #fdfdfd; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 15px; text-align: left; }
        .preference-panel h3 { font-size: 1rem; color: var(--dark-brown); margin-top: 0; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        .pref-group { margin-bottom: 10px; }
        .pref-title { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; display: block; }
        .parts-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .part-tag { font-size: 0.8rem; padding: 4px 8px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; user-select: none; }
        .part-tag.must { background-color: var(--primary-red); color: white; border-color: var(--primary-red); }
        .part-tag.never { background-color: #333; color: white; border-color: #333; text-decoration: line-through; }
        .spin-btn { background-color: var(--primary-red); color: white; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 15px; box-shadow: 0 4px #b71c1c; }
        .spin-btn:active { box-shadow: 0 0 transparent; transform: translateY(4px); }
        .result-area { min-height: 250px; padding: 10px; background: var(--paper-color); border: 1px solid #ddd; text-align: left; }
        .menu-item { margin-bottom: 10px; padding: 10px; border-left: 6px solid var(--primary-red); background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); position: relative;}
        .category-tag { font-size: 0.7rem; color: #fff; background: #8b4513; padding: 2px 5px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
        .item-name { font-size: 1.05rem; font-weight: bold; display: block; margin-top: 3px; }
        .caution { font-size: 0.75rem; color: var(--primary-red); background: #fff0f0; padding: 5px; margin-top: 5px; border-radius: 3px; border: 1px dashed #d32f2f; line-height: 1.4; }
        .pref-star { color: var(--gold); position: absolute; top: 5px; right: 5px; font-size: 1.2rem; }
        .call-text { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏮 もつ焼きルーレット Ver.18.0 🏮</h1>
    
    <div class="controls">
        <div class="control-group"><label>注文皿数：</label><select id="itemCount"><option value="3">3皿</option><option value="4">4皿</option><option value="5" selected>5皿</option><option value="6">6皿</option></select></div>
        <div class="control-group"><label for="rareCheck">希少部位（ホネ・ツル・シンキ等）</label><input type="checkbox" id="rareCheck" checked></div>
        <div class="control-group" style="background:#fff3e0; padding:5px; border-radius:4px;"><label for="kingMode" style="color:var(--dark-brown); font-weight:bold;">夕方以降「四天王モード」</label><input type="checkbox" id="kingMode" onchange="toggleKingMode()"></div>
    </div>

    <div class="preference-panel" id="prefPanel">
        <h3>✨ こだわり設定</h3>
        <div class="pref-group"><span class="pref-title">焼き・生（基本2本1皿）</span><div class="parts-tags" id="partsTags"></div></div>
        <div class="pref-group"><span class="pref-title">サイド・タン（1皿単位）</span><div class="parts-tags" id="sideTags"></div></div>
        <div class="pref-group"><span class="pref-title">希少部位（各1皿限定）</span><div class="parts-tags" id="rareTags"></div></div>
        <button style="font-size:0.7rem;" onclick="resetPreferences()">リセット</button>
    </div>

    <button class="spin-btn" onclick="spin()">ルーレットを回す！</button>
    <div class="result-area" id="result"><p style="text-align:center; padding-top:80px; color:#999;">「野生を取り戻す」注釈アップデート完了</p></div>
</div>

<script>
const flavors = ["塩", "カラ塩", "タレ", "カラ塩味噌", "ミソ", "素焼き", "素焼きオス"];
const grillStatus = ["", "良く焼き", "若焼き"];
const oshinkoOptions = ["", "オス", "ショウガ", "ショウガオス", "オスダケ", "オスダケショウガ", "カケナイデ", "カケナイデショウガ"];

const yakimonoPopularity = ["ツル", "カシラ", "ハツ", "ナンコツ", "アブラ", "レバ", "ガツ", "シロ"];
const namaPopularity = ["シンキ", "タンナマ", "ハツ", "ナンコツ", "アブラ", "ガツ", "レバ", "シロ"];

const allParts = ["シロ", "レバ", "ガツ", "ナンコツ", "アブラ", "ハツ"];
const sideItems = ["煮込み", "オシンコ", "ダイコン", "タンナマ"];
const rareParts = ["ホネ", "ツル", "シンキ", "カシラ"];

const siteNotes = {
    "焼_シロ": "焼きの定番。タレ良く焼きが人気。",
    "焼_レバ": "しっかり「良く焼き」がルール。",
    "焼_アブラ": "タレ良く焼きやカラ塩が人気。",
    "焼_ガツ": "噛み応えあり若焼き推奨。",
    "焼_ナンコツ": "コリコリ感がうま味。",
    "焼_ハツ": "若焼きで歯ごたえを楽しむのがオツ。",
    "焼_カシラ": "一皿限定。どんな焼き加減でも至極。",
    "焼_ツル": "あれば幸運。塩や素焼きが人気。",
    "生_シロ": "生独特のグニグニ感が良い。",
    "生_レバボイル": "ほんのりピンク、甘みがあってうまい。",
    "生_アブラ": "噛み応えあり野生を取り戻す。",
    "生_ガツ": "噛みしめるたびにうま味があふれる。",
    "生_ナンコツ": "焼きよりもさらにゴリゴリに。",
    "生_ハツ": "きれいな赤、クセなくうまい。",
    "生_タンナマ": "赤いとこオスが大人気。",
    "生_シンキ": "テッポウとコブクロの競演。迷わず頼むべし。",
    "煮込み": "いろいろな部位が煮込まれた究極メニュー。",
    "ホネ": "あごのホネまわりの肉を喰らう。ワイルドに手でどうぞ。割りばしがあるかな。",
    "オシンコ": "唯一の肉以外メニュー。箸休めでも主体でもいける。",
    "ダイコン": "冬場の甘さはまるでスイーツ。"
};

let preferences = {};

function init() {
    [...allParts, ...sideItems, ...rareParts].forEach(p => preferences[p] = 0);
    renderTags();
}

function renderTags() {
    const pD = document.getElementById('partsTags'); const sD = document.getElementById('sideTags'); const rD = document.getElementById('rareTags');
    pD.innerHTML = ''; sD.innerHTML = ''; rD.innerHTML = '';
    allParts.forEach(p => createTag(p, pD));
    sideItems.forEach(p => createTag(p, sD));
    rareParts.forEach(p => createTag(p, rD));
}

function createTag(name, container) {
    const span = document.createElement('span'); span.innerText = name; span.className = 'part-tag';
    if (preferences[name] === 1) span.classList.add('must');
    if (preferences[name] === 2) span.classList.add('never');
    span.onclick = () => { preferences[name] = (preferences[name] + 1) % 3; renderTags(); };
    container.appendChild(span);
}

function resetPreferences() { init(); }

function toggleKingMode() {
    const isK = document.getElementById('kingMode').checked;
    document.getElementById('rareCheck').disabled = isK;
    document.getElementById('prefPanel').style.opacity = isK ? 0.5 : 1;
}

function getRandom(a) { return a[Math.floor(Math.random() * a.length)]; }

function weightedSelect(pool, popularityOrder, isKing) {
    if (!isKing) return getRandom(pool);
    const reversedOrder = [...popularityOrder].reverse();
    const available = reversedOrder.filter(p => pool.includes(p));
    let weightedPool = [];
    available.forEach((p, idx) => {
        let weight = (idx < 3) ? 3 : 1; 
        for(let i=0; i<weight; i++) weightedPool.push(p);
    });
    return getRandom(weightedPool);
}

function spin() {
    const count = parseInt(document.getElementById('itemCount').value);
    const useRare = document.getElementById('rareCheck').checked;
    const isKing = document.getElementById('kingMode').checked;
    const resDiv = document.getElementById('result');
    resDiv.innerHTML = '';

    let items = [];
    let usedRare = new Set();
    let curPref = isKing ? {} : preferences;
    const neverList = new Set(Object.keys(curPref).filter(k => curPref[k] === 2));

    const mustList = Object.keys(curPref).filter(k => curPref[k] === 1);
    mustList.sort(() => Math.random() - 0.5).slice(0, count - 1).forEach(name => {
        let itm = createItem(name, true, isKing, usedRare, neverList);
        if (itm) items.push(itm);
    });

    if (!items.some(i => i.cat === "お新香") && !neverList.has("オシンコ") && !neverList.has("ダイコン") && items.length < count) {
        let type = isKing ? "ダイコン" : (Math.random() > 0.7 ? "ダイコン" : "オシンコ");
        items.push(createItem(type, false, isKing, usedRare, neverList));
    }
    
    if (!items.some(i => i.cat === "煮込み") && !neverList.has("煮込み") && items.length < count) {
        items.push(createItem("煮込み", false, isKing, usedRare, neverList));
    }

    while (items.length < count) {
        let poolParts = allParts.filter(p => !neverList.has(p));
        let types = poolParts.length > 0 ? ["yakimono", "nama"] : [];
        if (!isKing && useRare) {
            rareParts.forEach(r => { if(!usedRare.has(r) && !neverList.has(r)) types.push(r.toLowerCase()); });
        }
        if (!isKing && !neverList.has("タンナマ") && !items.some(i => i.name.includes("タンナマ"))) types.push("tannama");

        const t = getRandom(types);
        let itm = null;
        if (t === "yakimono" || t === "kashira") itm = createYakimono(t === "kashira" ? "カシラ" : weightedSelect(poolParts, yakimonoPopularity, isKing), usedRare);
        else if (t === "nama") itm = createNamaCombo(poolParts, isKing);
        else if (t === "tannama") itm = createTanNama(false, false);
        else itm = createItem(t.toUpperCase(), false, isKing, usedRare, neverList);
        
        if (itm && !items.some(i => i.name === itm.name)) items.push(itm);
        if (items.length > 20) break;
    }
    renderResults(items, isKing, resDiv);
}

function createItem(name, isM, isK, usedR, never) {
    if (name === "オシンコ" || name === "ダイコン") {
        const opt = getRandom(oshinkoOptions);
        return { cat: "お新香", name: `<span class="call-text">${name}${opt ? ' ' + opt : ''}</span>`, note: siteNotes[name], isM };
    }
    if (name === "煮込み" || name === "ホネ") {
        if (name === "ホネ") { usedR.add("ホネ"); return { cat: "希少部位", name: `<span class="call-text">ホネ</span>`, note: siteNotes["ホネ"], isM }; }
        let n = isK ? "煮込み" : getRandom(["煮込みハツモト混ぜて", "煮込み クロイノ以外", "煮込み アブラノトコ", "煮込み クロイトコ", "煮込み"]);
        let note = siteNotes["煮込み"];
        if (isK) note += "（夕方は詳細指定不可）";
        return { cat: "煮込み", name: `<span class="call-text">${n}</span>`, note: note, isM };
    }
    if (name === "タンナマ") return createTanNama(false, isM);
    if (name === "シンキ") { usedR.add("シンキ"); return { cat: "希少部位", name: `<span class="call-text">シンキ</span>`, note: siteNotes["生_シンキ"], isM }; }
    if (name === "ツル") { usedR.add("ツル"); return { cat: "希少部位", name: `<span class="call-text">ツル ${getRandom(["塩", "素焼き", "素焼きオス"])}</span>`, note: siteNotes["焼_ツル"], isM }; }
    if (name === "カシラ") return createYakimono("カシラ", usedR, isM);
    if (allParts.includes(name)) return Math.random() > 0.5 ? createYakimono(name, usedR, isM) : createNamaCombo(allParts, isK, isM);
    return null;
}

function createYakimono(p, usedR, isM = false) {
    if (p === "カシラ") usedR.add("カシラ");
    const f = getRandom(flavors);
    let gStr = getRandom(grillStatus);
    
    // ガツ・ハツは若焼きを優先的に選ぶ
    if ((p === "ガツ" || p === "ハツ") && Math.random() > 0.3) gStr = "若焼き";
    // シロ・アブラは良く焼きを優先的に選ぶ
    if ((p === "シロ" || p === "アブラ") && Math.random() > 0.3) gStr = "良く焼き";
    // レバは良く焼き固定
    if (p === "レバ") gStr = "良く焼き";

    return { cat: "焼き物", name: `<span class="call-text">${p} ${f}${gStr ? ' ' + gStr : ''}</span>`, note: siteNotes["焼_" + p] || "2本1皿。", isM };
}

function createNamaCombo(pool, isK, isM = false) {
    const p1 = weightedSelect(pool, namaPopularity, isK);
    let remainingPool = pool.filter(p => p !== p1);
    const p2 = remainingPool.length > 0 ? weightedSelect(remainingPool, namaPopularity, isK) : p1;
    const rawStyle = (p1 === "レバ" || p2 === "レバ") ? getRandom(["ボイル", "ボイルオス", "ボイル塩"]) : getRandom(["ナマ", "ナマオス", "ナマ塩"]);
    const adj = rawStyle.replace('ナマ', '').replace('ボイル', '') || '';
    const s1 = p1 === "レバ" ? "レバボイル" : p1;
    const s2 = p2 === "レバ" ? "レバボイル" : p2;
    
    let displayName = (p1 === p2) ? `<span class="call-text">${s1}${p1 === "レバ" ? "" : "ナマ"}${adj}</span>` : `<span class="call-text">${s1} と ${s2} 一本ずつ${adj ? ' ' + adj : ''}</span>`;
    
    let note = "「一本ずつ」は、ナマのみに許される。";
    if (p1 === p2) note += ` ${siteNotes["生_" + (p1 === "レバ" ? "レバボイル" : p1)] || ""}`;
    
    return { cat: "生（ナマ）", name: displayName, note: note, isM };
}

function createTanNama(big, isM) {
    const opt = getRandom(["", "オス", "塩", "赤いとこ", "赤いとこオス"]);
    const t = "タンナマ" + (opt ? " " + opt : "");
    return { cat: "生（ナマ）", name: `<span class="call-text">${t}</span>`, note: siteNotes["生_タンナマ"], isM };
}

function renderResults(itms, isK, div) {
    itms.forEach(i => {
        const d = document.createElement('div'); d.className = `menu-item`;
        d.innerHTML = `${i.isM ? '<span class="pref-star">★</span>' : ''}<span class="category-tag">${i.cat}</span><span class="item-name">${i.name}</span>${i.note ? `<div class="caution">${i.note}</div>` : ''}`;
        div.appendChild(d);
    });
}
init();
</script>
</body>
</html>
